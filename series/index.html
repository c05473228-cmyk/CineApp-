<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeriesApp</title>

<style>
/* ==== GLOBAL ==== */
body{
    margin:0;
    background:#0b0b0f;
    color:white;
    font-family:Arial;
    overflow-x:hidden;
}

/* Header */
header{
    padding:20px;
    font-size:25px;
    font-weight:bold;
    background:#141414;
    position:sticky;
    top:0;
    z-index:10;
    text-align:center;
}

/* Grid de series */
.series-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
    gap:15px;
    padding:20px;
}

.series-card{
    background:#1d1d1d;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.2s;
}

.series-card:hover{
    transform:scale(1.05);
}

.series-card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.series-card h3{
    padding:10px;
    font-size:16px;
}

/* Overlays */
.overlay, #playerOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.92);
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:40px;
    padding:20px;
    z-index:9999;
}

.hidden{
    display:none;
}

/* Caja info */
.info-box, .player-box{
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:500px;
}

.info-box img{
    width:100%;
    border-radius:10px;
}

.closeBtn{
    background:red;
    color:white;
    border:none;
    padding:7px 12px;
    border-radius:5px;
    cursor:pointer;
    float:right;
    margin-bottom:10px;
}

/* Episodios */
.episode{
    padding:10px;
    background:#242424;
    margin-top:10px;
    border-radius:8px;
    cursor:pointer;
}

.episode:hover{
    background:#2f2f2f;
}

/* Player */
.player-box iframe{
    width:100%;
    height:300px;
    border:none;
}
</style>

</head>
<body>

<header>
    SERIES APP
</header>

<!-- ============== CATÁLOGO ============== -->
<div id="seriesContainer" class="series-grid"></div>

<!-- ============== INFO DE SERIE ============== -->
<div id="seriesInfo" class="overlay hidden">
    <div class="info-box">
        <button class="closeBtn" onclick="closeInfo()">✖</button>
        <img id="infoImg">
        <h2 id="infoTitle"></h2>
        <p id="infoDesc"></p>

        <h3>Temporadas</h3>
        <select id="seasonSelect" onchange="renderEpisodes()"></select>

        <div id="episodesList"></div>
    </div>
</div>

<!-- ============== PLAYER ============== -->
<div id="playerOverlay" class="hidden">
    <div class="player-box">
        <button class="closeBtn" onclick="closePlayer()">✖</button>
        <iframe id="playerFrame" allowfullscreen></iframe>
    </div>
</div>

// =============================
// RENDER DEL CATÁLOGO
// =============================
const container = document.getElementById("seriesContainer");

series.forEach((s, index) => {
    let card = document.createElement("div");
    card.className = "series-card";
    card.innerHTML = `
        <img src="${s.img}">
        <h3>${s.title}</h3>
    `;
    card.onclick = () => openInfo(index);
    container.appendChild(card);
});

// =============================
//  ABRIR INFO
// =============================
let currentSeries = 0;

function openInfo(i){
    currentSeries = i;
    const s = series[i];

    document.getElementById("infoImg").src = s.img;
    document.getElementById("infoTitle").innerText = s.title;
    document.getElementById("infoDesc").innerText = s.desc;

    let seasonSelect = document.getElementById("seasonSelect");
    seasonSelect.innerHTML = "";

    s.seasons.forEach(season => {
        let opt = document.createElement("option");
        opt.value = season.season;
        opt.textContent = "Temporada " + season.season;
        seasonSelect.appendChild(opt);
    });

    renderEpisodes();

    document.getElementById("seriesInfo").classList.remove("hidden");
}

function closeInfo(){
    document.getElementById("seriesInfo").classList.add("hidden");
}


// =============================
// EPISODIOS
// =============================
function renderEpisodes(){
    const s = series[currentSeries];
    const seasonNumber = parseInt(document.getElementById("seasonSelect").value);
    const season = s.seasons.find(se => se.season === seasonNumber);

    const list = document.getElementById("episodesList");
    list.innerHTML = "";

    season.episodes.forEach(ep => {
        let div = document.createElement("div");
        div.className = "episode";
        div.innerText = ep.title;
        div.onclick = () => openPlayer(ep.url);
        list.appendChild(div);
    });
}


// =============================
// PLAYER
// =============================
function openPlayer(url){
    document.getElementById("playerFrame").src = url;
    document.getElementById("playerOverlay").classList.remove("hidden");
}

function closePlayer(){
    document.getElementById("playerFrame").src = "";
    document.getElementById("playerOverlay").classList.add("hidden");
}

</script>
