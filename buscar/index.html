<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador CineApp</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>

/* ===== GENERAL ===== */
body{
    margin:0;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

/* BOTÓN MENU */
.nav__link{
    color:white;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:15px;
}

/* ===== OVERLAY ===== */
#searchOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0b0b0f;
    display:none;
    z-index:99999;
    padding:15px;
}

/* HEADER */
.search-header{
    display:flex;
    align-items:center;
    gap:12px;
}

/* BOTÓN ATRÁS */
.back-btn{
    color:white;
    font-size:28px;
    cursor:pointer;
}

/* CAJA */
.search-box{
    flex:1;
    height:52px;
    background:#181818;
    border-radius:30px;
    display:flex;
    align-items:center;
    padding:0 18px;
}

/* ICONOS */
.search-box span{
    color:#888;
}

/* INPUT */
.search-box input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:white;
    font-size:16px;
    margin-left:10px;
}

.search-box input::placeholder{
    color:#777;
}

/* MENSAJE */
#noResults{
    display:none;
    text-align:center;
    margin-top:50px;
    color:#888;
    font-size:18px;
}

</style>
</head>
<body>

<!-- BOTÓN BUSCAR -->
<a href="javascript:void(0)" class="nav__link" onclick="abrirBuscador()">
    <span class="material-icons">search</span>
    <span>Buscar</span>
</a>

<!-- BUSCADOR -->
<div id="searchOverlay">

    <div class="search-header">

        <span class="material-icons back-btn" onclick="cerrarBuscador()">arrow_back</span>

        <div class="search-box">
            <span class="material-icons">search</span>

            <input 
            type="text"
            id="searchInput"
            placeholder="Buscar películas..."
            onkeyup="filtrarTarjetas()">
        </div>

    </div>

    <div id="noResults">No se encontraron resultados</div>

</div>

<!-- EJEMPLO TARJETAS -->
<ul>

<li class="TPostMv" data-title="Matrix Resurrections">🎬 Matrix Resurrections</li>

<li class="TPostMv" data-title="Avatar 2">🎬 Avatar 2</li>

<li class="TPostMv" data-title="John Wick 4">🎬 John Wick 4</li>

<li class="TPostMv" data-title="The Batman">🎬 The Batman</li>

</ul>

<script>

function abrirBuscador(){
    document.getElementById("searchOverlay").style.display="block";
    document.getElementById("searchInput").focus();
}

function cerrarBuscador(){
    document.getElementById("searchOverlay").style.display="none";
}

/* FILTRAR */
function filtrarTarjetas(){

    let texto = document.getElementById("searchInput").value.toLowerCase();

    let tarjetas = document.querySelectorAll(".TPostMv");

    let encontrados = 0;

    tarjetas.forEach(function(card){

        let nombre = card.getAttribute("data-title").toLowerCase();

        if(nombre.includes(texto)){
            card.style.display="block";
            encontrados++;
        }else{
            card.style.display="none";
        }

    });

    if(encontrados == 0){
        document.getElementById("noResults").style.display="block";
    }else{
        document.getElementById("noResults").style.display="none";
    }

}

</script>

</body>
</html>
