<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador CineApp</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>

/* ===== GENERAL ===== */
body{
    margin:0;
    padding:0;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

/* ===== BOTÓN MENU ===== */
.nav__link{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:#fff;
    padding:10px;
    font-size:13px;
    transition:.2s;
}

.nav__link:hover{
    color:#e50914;
}

.nav__text{
    margin-top:3px;
    font-size:12px;
}

/* ===== OVERLAY ===== */
#searchOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0b0b0f;
    display:none;
    z-index:99999;
    padding:15px;
    box-sizing:border-box;
}

/* ===== HEADER ===== */
.search-header{
    display:flex;
    align-items:center;
    gap:12px;
}

/* ===== FLECHA ===== */
.back-btn{
    color:white;
    font-size:28px;
    cursor:pointer;
    transition:.2s;
}

.back-btn:hover{
    color:#e50914;
}

/* ===== CAJA BUSCADOR ===== */
.search-box{
    flex:1;
    height:52px;
    background:#181818;
    border-radius:30px;
    display:flex;
    align-items:center;
    padding:0 18px;
    box-shadow:0 0 10px rgba(255,255,255,.05);
}

/* ===== ICONOS ===== */
.search-box span{
    color:#888;
}

/* ===== INPUT ===== */
.search-box input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:white;
    font-size:16px;
    margin-left:10px;
}

.search-box input::placeholder{
    color:#666;
}

/* ===== MENSAJE ===== */
#noResults{
    display:none;
    text-align:center;
    margin-top:50px;
    color:#888;
    font-size:18px;
}

</style>
</head>
<body>

<!-- BOTÓN BUSCADOR -->
<a href="javascript:void(0)" class="nav__link" onclick="abrirBuscador()">
    <span class="material-icons">search</span>
    <span class="nav__text">Buscar</span>
</a>

<!-- PANEL BUSCADOR -->
<div id="searchOverlay">

    <div class="search-header">

        <span class="material-icons back-btn" onclick="cerrarBuscador()">arrow_back</span>

        <div class="search-box">
            <span class="material-icons">search</span>

            <input
            type="text"
            id="searchInput"
            placeholder="Buscar película..."
            onkeyup="filtrarTarjetas()">
        </div>

    </div>

    <div id="noResults">No se encontraron resultados</div>

</div>

<script>

/* ABRIR */
function abrirBuscador(){
    document.getElementById("searchOverlay").style.display="block";
    document.getElementById("searchInput").focus();
}

/* CERRAR */
function cerrarBuscador(){
    document.getElementById("searchOverlay").style.display="none";
}

/* FILTRAR TUS TARJETAS */
function filtrarTarjetas(){

    let texto = document.getElementById("searchInput").value.toLowerCase();

    let tarjetas = document.querySelectorAll(".TPostMv");

    let encontrados = 0;

    tarjetas.forEach(function(card){

        let nombre = card.getAttribute("data-title");

        if(nombre){

            nombre = nombre.toLowerCase();

            if(nombre.includes(texto)){
                card.style.display="block";
                encontrados++;
            }else{
                card.style.display="none";
            }

        }

    });

    if(encontrados == 0){
        document.getElementById("noResults").style.display="block";
    }else{
        document.getElementById("noResults").style.display="none";
    }

}

</script>

</body>
</html>
