<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Prime App</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#0f171e;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#0f171e;
}

header h1{
  color:#00a8e1;
}

input{
  padding:8px;
  border:none;
  border-radius:5px;
  width:200px;
}

/* CARRUSEL */
.section{
  margin:20px;
}

.section h2{
  margin-bottom:10px;
}

.carousel{
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.card{
  min-width:150px;
  height:220px;
  background:#222;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
  position:relative;
}

.card img{
  width:100%;
  height:100%;
  border-radius:10px;
  object-fit:cover;
}

.card:hover{
  transform:scale(1.1);
}

/* PLAYER */
#player{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#player iframe{
  width:90%;
  height:60%;
  border:none;
}

#close{
  position:absolute;
  top:20px;
  right:20px;
  background:red;
  padding:10px;
  cursor:pointer;
  border-radius:5px;
}

/* BOTONES */
.footer{
  text-align:center;
  margin:30px;
}

button{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.report{
  background:#ff3b3b;
  color:white;
}

.share{
  background:#25D366;
  color:white;
}
</style>
</head>

<body>

<header>
<h1>MiPrime</h1>
<input type="text" id="search" placeholder="Buscar...">
</header>

<!-- PELÍCULAS -->
<div class="section">
<h2>Películas</h2>
<div class="carousel" id="movies"></div>
</div>

<!-- SERIES -->
<div class="section">
<h2>Series</h2>
<div class="carousel" id="series"></div>
</div>

<!-- PLAYER -->
<div id="player">
<div id="close" onclick="cerrar()">X</div>
<iframe id="video"></iframe>
</div>

<!-- BOTONES -->
<div class="footer">
<button class="report" onclick="reportar()">Reportar error</button>
<button class="share" onclick="compartir()">Compartir</button>
</div>

<script>
// DATOS (puedes cambiar enlaces)
const peliculas = [
  {
    titulo:"Película 1",
    img:"https://via.placeholder.com/300x450",
    link:"https://www.youtube.com/embed/dQw4w9WgXcQ"
  },
  {
    titulo:"Película 2",
    img:"https://via.placeholder.com/300x450",
    link:"https://www.youtube.com/embed/tgbNymZ7vqY"
  },
  {
    titulo:"Película 3",
    img:"https://via.placeholder.com/300x450",
    link:"https://www.youtube.com/embed/ysz5S6PUM-U"
  }
];

const series = [
  {
    titulo:"Serie 1",
    img:"https://via.placeholder.com/300x450",
    link:"https://www.youtube.com/embed/dQw4w9WgXcQ"
  },
  {
    titulo:"Serie 2",
    img:"https://via.placeholder.com/300x450",
    link:"https://www.youtube.com/embed/tgbNymZ7vqY"
  }
];

// GENERAR TARJETAS
function cargar(){
  peliculas.forEach(p=>{
    document.getElementById("movies").innerHTML += `
      <div class="card" onclick="ver('${p.link}')">
        <img src="${p.img}">
      </div>
    `;
  });

  series.forEach(s=>{
    document.getElementById("series").innerHTML += `
      <div class="card" onclick="ver('${s.link}')">
        <img src="${s.img}">
      </div>
    `;
  });
}

// REPRODUCTOR
function ver(link){
  document.getElementById("player").style.display="flex";
  document.getElementById("video").src=link;
}

function cerrar(){
  document.getElementById("player").style.display="none";
  document.getElementById("video").src="";
}

// BUSCADOR
document.getElementById("search").addEventListener("input",function(){
  let valor = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(valor) ? "block" : "none";
  });
});

// BOTONES
function reportar(){
  window.location.href="mailto:tucorreo@gmail.com";
}

function compartir(){
  window.open("https://wa.me/?text=Mira%20esta%20app");
}

// INICIAR
cargar();
</script>

</body>
</html>
