<style>
body{
  margin:0;
  background:#0b0b0f;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
}

/* HEADER HBO */
#header{
  position:fixed;
  top:0;
  width:100%;
  z-index:50;
  padding:16px 24px;
  display:flex;
  align-items:center;
  gap:14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.9),rgba(0,0,0,0));
  transition:transform .35s;
}

#introCine{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:999999;
font-family:Arial, sans-serif;
}

/* LOGO */

.logoIntro{
font-size:80px;
font-weight:bold;
color:white;
letter-spacing:6px;
}

.logoIntro span{
color:#7b3cff;
}

.series-section {
  padding: 15px;
  color: white;
}

.series-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.serie-card {
  flex-shrink: 0;
}

.serie-card img {
  width: 150px;   /* 🔥 CONTROL AQUÍ */
  height: 220px;  /* 🔥 CONTROL AQUÍ */
  object-fit: cover;
  border-radius: 12px;
}

/* MODAL */
#serieModal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:9999;
}

.modal-content {
  padding: 20px;
  color:white;
}

.modal-content span {
  font-size: 25px;
  cursor: pointer;
}

/* BOTONES */
.temporada-btn, .capitulo-btn {
  display: inline-block;
  padding: 8px 12px;
  margin: 5px;
  background: #222;
  border-radius: 8px;
  cursor: pointer;
}






.top10 {
  padding: 20px;
  color: white;
}

.top10 h2 {
  font-size: 22px;
  margin-bottom: 15px;
}

/* Carrusel */
.top10-row {
  display: flex;
  gap: 15px;
  overflow-x: auto;
  scroll-behavior: smooth;
}

.top10-row::-webkit-scrollbar {
  display: none;
}

/* Tarjeta */
.top-card {
  position: relative;
  min-width: 130px;
  flex-shrink: 0;
}

.top-card img {
  border-radius: 14px;
}

/* Imagen PRO */
.top-card img {
  width: 130px;
  height: 190px;
  border-radius: 14px;
  object-fit: cover;
  position: relative;
  z-index: 2;
  transition: 0.3s;
}

/* Hover estilo Netflix */
.top-card:hover img {
  transform: scale(1.08);
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}



/* Sombra elegante */
.top-card::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 40%;
  border-radius: 14px;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  z-index: 2;
}


.top-card {
  position: relative;
}

/* IMAGEN abajo */
.top-card img {
  width: 150px;
  height: 220px;
  border-radius: 14px;
  object-fit: cover;
  position: relative;
  z-index: 1; /* 🔥 más bajo */
}



.top10 {
  background: rgba(255,255,255,0.02);
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

.top-number {
  position: absolute;
  bottom: -10px;
  left: -5px;
  font-size: 90px;
  font-weight: 900;
  color: transparent;
  -webkit-text-stroke: 2px white;
  text-shadow: 0 0 25px rgba(255,255,255,0.4);
  z-index: 5;
}

/* Efecto glow */
.rank::after {
  content: attr(data-rank);
  position: absolute;
  top: 0;
  left: 0;
  color: rgba(255,255,255,0.15);
  filter: blur(8px);
  z-index: -1;
}

/* PUNTO DE CARGA */

.loadingDot{
width:8px;
height:8px;
background:white;
margin-top:25px;
border-radius:50%;
animation:dotMove 1s infinite;
}

/* TEXTO */

.loadingText{
color:#aaa;
margin-top:15px;
font-size:14px;
letter-spacing:1px;
}

/* ANIMACION */

@keyframes dotMove{

0%{opacity:0;}

50%{opacity:1;}

100%{opacity:0;}

}



#playerOverlay{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#000;
display:none;
z-index:99999;
}

.playerWrapper{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:95%;
max-width:900px;
aspect-ratio:16/9;
}

#playerFrame{
width:100%;
height:100%;
border:none;
}

.playerClose{
position:fixed;
top:20px;
left:20px;
font-size:32px;
color:white;
cursor:pointer;
background:rgba(0,0,0,.7);
padding:8px 14px;
border-radius:10px;
}


#logo{
  font-size:24px;
  font-weight:bold;
  color:#7b2cff;
}

#search{
  flex:1;
  background:#1c1c22;
  border:none;
  border-radius:22px;
  padding:12px 16px;
  color:#fff;
  font-size:15px;
}

/* HERO HBO GRANDE */
.hero{
  position:relative;
  height:85vh;
  min-height:520px;
  overflow:hidden;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#0b0b0f 0%,rgba(0,0,0,0) 60%);
}

/* CONTENIDO */
#content{
  margin-top:-120px;
  position:relative;
  z-index:5;
}



.section{
  padding-left:16px;
  padding-right:16px;
}


.section h2{
  margin:0 0 16px;
  font-size:20px;
}

/* CARRUSEL HBO */
.carousel{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-bottom:10px;
}

.card{
  min-width:100px;
  width:150px;
  height:220px; /* proporción poster cine */
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .25s;
  background:#111;
  flex-shrink:0;
}

.card:hover{
  transform:scale(1.08);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}


.card{
position:relative;
}

.favBtn{
position:absolute;
top:8px;
right:8px;
background:rgba(0,0,0,0.7);
color:white;
font-size:18px;
padding:5px 8px;
border-radius:50%;
cursor:pointer;
}

.favActive{
color:red;
}



</style>

<script>
/* HERO AUTO */
const heroMovies = [
{
  image: "https://image.tmdb.org/t/p/original/8rpDcsfLJypbO6vREc0547VKqEv.jpg",
  video: "https://tuservidor.com/pelicula1.mp4"
},
{
  image: "https://image.tmdb.org/t/p/original/74xTEgt7R36Fpooo50r9T25onhq.jpg",
  video: "https://tuservidor.com/pelicula2.mp4"
}
];

let index = 0;

setInterval(() => {
  document.getElementById("heroImg").src = heroMovies[index].image;
  index = (index + 1) % heroMovies.length;
}, 5000);

document.querySelector(".hero").onclick = function(){
  openPlayer(heroMovies[index].video);
};

/* HEADER HIDE SCROLL */
let lastScroll=0;
window.addEventListener("scroll",()=>{
  const header=document.getElementById("header");
  const y=window.pageYOffset;

  if(y>lastScroll) header.style.transform="translateY(-100%)";
  else header.style.transform="translateY(0)";

  lastScroll=y;
});

/* BUSCADOR HBO */
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");
const resultsBox = document.getElementById("searchResults");
const resultsGrid = document.getElementById("resultsGrid");

search.addEventListener("input", () => {
  const q = search.value.toLowerCase().trim();

  resultsGrid.innerHTML = "";

  if (q === "") {
    resultsBox.style.display = "none";
    return;
  }

  let found = false;

  cards.forEach(card => {
    const title = card.dataset.title.toLowerCase();
    if (title.includes(q)) {
      const clone = card.cloneNode(true);
      resultsGrid.appendChild(clone);
      found = true;
    }
  });

  resultsBox.style.display = found ? "block" : "none";
});


</script>

<script>
window.addEventListener("load", function(){

// CREAR MENU INFERIOR

// Botón Series
var seriesBtn = document.createElement("div");
seriesBtn.innerHTML = "📺<br><small>Series</small>";
seriesBtn.style.color = "white";
seriesBtn.style.textAlign = "center";
seriesBtn.onclick = function(){
  window.location.href = "go:43";

// Botón Perfil
var profileBtn = document.createElement("div");
profileBtn.id = "profileBtn";
profileBtn.innerHTML = "👤<br><small>Perfil</small>";
profileBtn.style.color = "white";
profileBtn.style.textAlign = "center";
profileBtn.onclick = openProfile;

// Agregar botones
menu.appendChild(seriesBtn);
menu.appendChild(profileBtn);

// Agregar al body
document.body.appendChild(menu);


// =====================
// SCROLL SHOW/HIDE
// =====================
var lastScroll = 0;

window.addEventListener("scroll", function(){
  var currentScroll = window.pageYOffset;

  if(currentScroll > lastScroll && currentScroll > 50){
    menu.style.transform = "translate(-50%, 100px)";
    menu.style.opacity = "0";
  } else {
    menu.style.transform = "translate(-50%, 0)";
    menu.style.opacity = "1";
  }

  lastScroll = currentScroll;
});


// =====================
// CREAR PERFIL
// =====================
var modal = document.createElement("div");
modal.id = "profileModal";

modal.style.display = "none";
modal.style.position = "fixed";
modal.style.top = "0";
modal.style.left = "0";
modal.style.width = "100%";
modal.style.height = "100%";
modal.style.background = "black";
modal.style.zIndex = "10000";
modal.style.color = "white";
modal.style.padding = "20px";
modal.style.overflow = "auto";

modal.innerHTML = `
<h2 style="text-align:center;">Tu perfil</h2>

<div style="display:flex; flex-direction:column; align-items:center;">

<img id="mainAvatar" src="https://i.pravatar.cc/150?img=1" style="width:100px; height:100px; border-radius:50%; border:3px solid red;">

<input id="profileName" placeholder="Tu nombre" style="margin-top:10px; padding:10px; border-radius:10px; border:none; text-align:center; width:80%;">
</div>

<h3>Avatares</h3>

<div id="avatarList" style="display:flex; gap:10px; overflow:auto;">
</div>

<button onclick="saveProfile()" style="width:100%; padding:10px; background:red; border:none; border-radius:10px; margin-top:20px; color:white;">
Guardar
</button>

<button onclick="closeProfile()" style="width:100%; padding:10px; background:#333; border:none; border-radius:10px; margin-top:10px; color:white;">
Cerrar
</button>
`;

document.body.appendChild(modal);


// =====================
// CREAR AVATARES
// =====================
var avatarList = document.getElementById("avatarList");

for(let i=1;i<=8;i++){
  let img = document.createElement("img");
  img.src = "https://i.pravatar.cc/100?img="+i;
  img.style.width = "60px";
  img.style.height = "60px";
  img.style.borderRadius = "50%";
  img.onclick = function(){
    selectAvatar(img.src);
  };
  avatarList.appendChild(img);
}


// =====================
// FUNCIONES PERFIL
// =====================
window.openProfile = function(){
  modal.style.display = "block";

  document.getElementById("profileName").value = localStorage.getItem("name") || "";
  let avatar = localStorage.getItem("avatar");

  if(avatar){
    document.getElementById("mainAvatar").src = avatar;
  }
};

window.closeProfile = function(){
  modal.style.display = "none";
};

var selectedAvatar = "";

window.selectAvatar = function(src){
  selectedAvatar = src;
  document.getElementById("mainAvatar").src = src;
};

window.saveProfile = function(){
  let name = document.getElementById("profileName").value;

  localStorage.setItem("name", name);
  localStorage.setItem("avatar", selectedAvatar);

  updateProfile();
  modal.style.display = "none";
};


// =====================
// ACTUALIZAR BOTON PERFIL
// =====================
function updateProfile(){
  let avatar = localStorage.getItem("avatar");

  if(avatar){
    profileBtn.innerHTML = '<img src="'+avatar+'" style="width:30px; height:30px; border-radius:50%;"><br><small>Perfil</small>';
  }
}

// cargar al inicio
updateProfile();

});
</script>



<script>

// DATOS DE SERIES
const series = {
  serie1: {
    title: "Mi Serie 1",
    temporadas: {
      "Temporada 1": [
        {name:"Cap 1", link:"https://www.w3schools.com/html/mov_bbb.mp4"},
        {name:"Cap 2", link:"https://www.w3schools.com/html/mov_bbb.mp4"}
      ],
      "Temporada 2": [
        {name:"Cap 1", link:"https://www.w3schools.com/html/mov_bbb.mp4"}
      ]
    }
  },

  serie2: {
    title: "Mi Serie 2",
    temporadas: {
      "Temporada 1": [
        {name:"Cap 1", link:"https://www.w3schools.com/html/mov_bbb.mp4"}
      ]
    }
  }
};


// ABRIR SERIE
function openSerie(id){
  const serie = series[id];

  document.getElementById("serieModal").style.display = "block";
  document.getElementById("serieTitle").innerText = serie.title;

  let tempHTML = "";

  for(let temp in serie.temporadas){
    tempHTML += `<div class="temporada-btn" onclick="loadCaps('${id}','${temp}')">${temp}</div>`;
  }

  document.getElementById("temporadas").innerHTML = tempHTML;
  document.getElementById("capitulos").innerHTML = "";
}


// CARGAR CAPÍTULOS
function loadCaps(id, temp){
  const caps = series[id].temporadas[temp];

  let html = "";

  caps.forEach(cap=>{
    html += `<div class="capitulo-btn" onclick="playVideo('${cap.link}')">${cap.name}</div>`;
  });

  document.getElementById("capitulos").innerHTML = html;
}


// CERRAR
function closeSerie(){
  document.getElementById("serieModal").style.display = "none";
}

</script>
