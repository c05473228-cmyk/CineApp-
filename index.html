<title>CineApp</title>

<style>
body{
  margin:0;
  background:#0b0b0f;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
}

/* HEADER HBO */
#header{
  position:fixed;
  top:0;
  width:100%;
  z-index:50;
  padding:16px 24px;
  display:flex;
  align-items:center;
  gap:14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.9),rgba(0,0,0,0));
  transition:transform .35s;
}

#introCine{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:999999;
font-family:Arial, sans-serif;
}

/* LOGO */

.logoIntro{
font-size:80px;
font-weight:bold;
color:white;
letter-spacing:6px;
}

.logoIntro span{
color:#7b3cff;
}

.series-section {
  padding: 15px;
  color: white;
}

.series-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.serie-card {
  flex-shrink: 0;
}

.serie-card img {
  width: 300px;   /* 🔥 CONTROL AQUÍ */
  height: 160px;  /* 🔥 CONTROL AQUÍ */
  object-fit: cover;
  border-radius: 12px;
}

/* MODAL */
#serieModal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:9999;
}

.modal-content {
  padding: 20px;
  color:white;
}

.modal-content span {
  font-size: 25px;
  cursor: pointer;
}

/* BOTONES */
.temporada-btn, .capitulo-btn {
  display: inline-block;
  padding: 8px 12px;
  margin: 5px;
  background: #222;
  border-radius: 8px;
  cursor: pointer;
}






.top10 {
  padding: 20px;
  color: white;
}

.top10 h2 {
  font-size: 22px;
  margin-bottom: 15px;
}

/* Carrusel */
.top10-row {
  display: flex;
  gap: 15px;
  overflow-x: auto;
  scroll-behavior: smooth;
}

.top10-row::-webkit-scrollbar {
  display: none;
}

/* Tarjeta */
.top-card {
  position: relative;
  min-width: 130px;
  flex-shrink: 0;
}

.top-card img {
  border-radius: 14px;
}

/* Imagen PRO */
.top-card img {
  width: 300px;
  height: 190px;
  border-radius: 14px;
  object-fit: cover;
  position: relative;
  z-index: 2;
  transition: 0.3s;
}

/* Hover estilo Netflix */
.top-card:hover img {
  transform: scale(1.08);
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}



/* Sombra elegante */
.top-card::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 40%;
  border-radius: 14px;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  z-index: 2;
}


.top-card {
  position: relative;
}

/* IMAGEN abajo */
.top-card img {
  width: 300px;
  height: 160px;
  border-radius: 14px;
  object-fit: cover;
  position: relative;
  z-index: 1; /* 🔥 más bajo */
}



.top10 {
  background: rgba(255,255,255,0.02);
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

.top-number {
  position: absolute;
  bottom: -10px;
  left: -5px;
  font-size: 90px;
  font-weight: 900;
  color: transparent;
  -webkit-text-stroke: 2px white;
  text-shadow: 0 0 25px rgba(255,255,255,0.4);
  z-index: 5;
}

/* Efecto glow */
.rank::after {
  content: attr(data-rank);
  position: absolute;
  top: 0;
  left: 0;
  color: rgba(255,255,255,0.15);
  filter: blur(8px);
  z-index: -1;
}

/* PUNTO DE CARGA */

.loadingDot{
width:8px;
height:8px;
background:white;
margin-top:25px;
border-radius:50%;
animation:dotMove 1s infinite;
}

/* TEXTO */

.loadingText{
color:#aaa;
margin-top:15px;
font-size:14px;
letter-spacing:1px;
}

/* ANIMACION */

@keyframes dotMove{

0%{opacity:0;}

50%{opacity:1;}

100%{opacity:0;}

}



#playerOverlay{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#000;
display:none;
z-index:9999999;
}



.playerWrapper{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:95%;
max-width:900px;
aspect-ratio:16/9;
}

#playerFrame{
width:100%;
height:100%;
border:none;
}

.playerClose{
position:fixed;
top:20px;
left:20px;
font-size:32px;
color:white;
cursor:pointer;
background:rgba(0,0,0,.7);
padding:8px 14px;
border-radius:10px;
}


#logo{
  font-size:24px;
  font-weight:bold;
  color:#7b2cff;
}

#search{
  flex:1;
  background:#1c1c22;
  border:none;
  border-radius:22px;
  padding:12px 16px;
  color:#fff;
  font-size:15px;
}

#searchResults{
  position:fixed;
  top:70px;
  left:0;
  width:100%;
  background:#0e0e12;
  padding:18px 16px;
  display:none;
  z-index:999;
  border-top:1px solid rgba(255,255,255,0.05);
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* HERO HBO GRANDE */
.hero{
  position:relative;
  width:100%;
  height:60vh;      /* antes 85vh */
  min-height:350px; /* antes 520px */
  overflow:hidden;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#0b0b0f 0%,rgba(0,0,0,0) 60%);
}

/* CONTENIDO */
#content{
  margin-top:-60px; /* antes -120px */
  position:relative;
  z-index:5;
}



.section{
  padding-left:16px;
  padding-right:16px;
}


.section h2{
  margin:0 0 16px;
  font-size:20px;
}

/* CARRUSEL HBO */
.carousel{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-bottom:10px;
}

.card{
  min-width:100px;
  width:140px;
  height:210px; /* proporción poster cine */
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .25s;
  background:#111;
  flex-shrink:0;
}

.card:hover{
  transform:scale(1.08);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}


.card{
position:relative;
}

.favBtn{
position:absolute;
top:8px;
right:8px;
background:rgba(0,0,0,0.7);
color:white;
font-size:18px;
padding:5px 8px;
border-radius:50%;
cursor:pointer;
}

.favActive{
color:red;
}


*{
  scroll-behavior:smooth;
}


.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.section-header span{
  font-size:14px;
  color:#7b3cff;
  cursor:pointer;
}



</style>

}
];

let index = 0;

setInterval(() => {
  document.getElementById("heroImg").src = heroMovies[index].image;
  index = (index + 1) % heroMovies.length;
}, 5000);

document.querySelector(".hero").onclick = function(){
  openPlayer(heroMovies[index].video);
};

/* HEADER HIDE SCROLL */
let lastScroll=0;
window.addEventListener("scroll",()=>{
  const header=document.getElementById("header");
  const y=window.pageYOffset;

  if(y>lastScroll) header.style.transform="translateY(-100%)";
  else header.style.transform="translateY(0)";

  lastScroll=y;
});

/* BUSCADOR HBO */
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");
const resultsBox = document.getElementById("searchResults");
const resultsGrid = document.getElementById("resultsGrid");

search.addEventListener("input", () => {
  const q = search.value.toLowerCase().trim();

  resultsGrid.innerHTML = "";

  if (q === "") {
    resultsBox.style.display = "none";
    return;
  }

  let found = false;

  cards.forEach(card => {
    const title = card.dataset.title.toLowerCase();
    if (title.includes(q)) {
      const clone = card.cloneNode(true);
      resultsGrid.appendChild(clone);
      found = true;
    }
  });

  resultsBox.style.display = found ? "block" : "none";
});


</script>

function openCollection(id){

  const data = collections[id];

  document.getElementById("collectionTitle").innerText = data.title;

  const grid = document.getElementById("collectionGrid");
  grid.innerHTML = "";

  data.movies.forEach(movie => {

    const div = document.createElement("div");
    div.className = "collection-movie";

    div.innerHTML = `
      <img src="${movie.img}">
      <p>${movie.name}</p>
    `;

    div.onclick = () => openPlayer(movie.link);

    grid.appendChild(div);
  });

  document.getElementById("collectionModal").style.display = "block";
}

// 3. CERRAR COLECCIÓN
// ======================================
function closeCollection(){
  document.getElementById("collectionModal").style.display = "none";
}


// ======================================
// 4. ABRIR REPRODUCTOR
// ======================================
function openPlayer(url){

  // CERRAR LISTA
  document.getElementById("collectionModal").style.display = "none";

  // MOSTRAR REPRODUCTOR
  const player = document.getElementById("videoPlayerView");
  player.style.display = "block";

  // CARGAR VIDEO
  player.innerHTML = `
    <span onclick="closePlayer()" style="
      position:absolute;
      top:20px;
      left:20px;
      color:white;
      font-size:30px;
      cursor:pointer;
      z-index:10;
    ">✕</span>

    <iframe src="${url}" allowfullscreen></iframe>
  `;
}

// ======================================
// 5. CERRAR REPRODUCTOR
// ======================================
function closePlayer(){
  const player = document.getElementById("videoPlayerView");
  player.style.display = "none";
  player.innerHTML = "";
}

</script>


<script>
function openFullList(el){

  // Buscar el carrusel más cercano
  let parent = el.parentElement;
  let carousel = null;

  while(parent){
    carousel = parent.querySelector(".carousel");
    if(carousel) break;
    parent = parent.parentElement;
  }

  if(!carousel){
    alert("No se encontró el carrusel");
    return;
  }

  // Título
  const h2 = parent.querySelector("h2");
  document.getElementById("fullListTitle").innerText =
    h2 ? h2.innerText : "Películas";

  // Clonar las tarjetas del carrusel
  const cards = carousel.querySelectorAll(".card");
  const grid = document.getElementById("fullListGrid");

  grid.innerHTML = "";
  cards.forEach(card=>{
    const clone = card.cloneNode(true);

    // 🔥 Re-crear acción de la tarjeta
    clone.addEventListener("click", ()=>{
      card.click();
    });

    grid.appendChild(clone);
  });

  // Abrir lista completa
  document.getElementById("fullListView").style.display = "block";
}
</script>


<script>function closeFullList(){
  document.getElementById("fullListView").style.display = "none";
}
</script>



<!-- 🔥 FULL LIST VIEW (Nueva ventana) -->
<div id="fullListView" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0b0b0f;
    z-index: 999999;
    display: none;
    overflow-y: auto;

    /* 🔥 CAMBIO CLAVE */
    padding: 70px 20px 20px;
">

   <div style="
    position: sticky;
    top: 0;
    background: #0b0b0f;
    padding: 10px 0;
    z-index: 10000000;
    display:flex;
    justify-content:space-between;
    align-items:center;
">
        <h2 id="fullListTitle"></h2>
        <button onclick='closeFullList()' style="
            background:none;
            color:white;
            font-size:18px;
            border:none;
        ">Cerrar ✖</button>
    </div>

    <div id="fullListGrid" style="
        display:grid;
        grid-template-columns: repeat(2, 1fr);
        gap:15px;
        margin-top:20px;
    "></div>

</div>



<script>
// 🔥 Forzar z-index correcto
document.addEventListener("DOMContentLoaded", () => {
    const fullList = document.getElementById("fullListView");
    const player = document.getElementById("playerOverlay");

    if(fullList){
        fullList.style.zIndex = "9999";
    }

    if(player){
        player.style.zIndex = "999999999";
    }
});

// 🔥 Mejorar openPlayer para que NO quede tapado
function openPlayer(url){
    // Abrir reproductor
    const playerFrame = document.getElementById("playerFrame");
    const overlay = document.getElementById("playerOverlay");
    const fullList = document.getElementById("fullListView");

    // Ocultar lista si está abierta
    if(fullList){
        fullList.style.display = "none";
    }

    // Mostrar reproductor
    overlay.style.display = "block";
    playerFrame.src = url;
}

// 🔥 Cerrar reproductor
function closePlayer(){
    const overlay = document.getElementById("playerOverlay");
    const playerFrame = document.getElementById("playerFrame");

    overlay.style.display = "none";
    playerFrame.src = "";
}
</script>
